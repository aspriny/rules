🇸🇬 狮城节点 = url-test, policy-path=http://10.10.10.251:3001/aspriny/download/taozi, policy-regex-filter=(新|SG), interval=300

# ================== 规则 ==================
[Rule]

# ===== 本地 & 私有 =====
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Private/Private.list,DIRECT

# ===== AI（关键优化）=====
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/OpenAI/OpenAI.list,"💬 OpenAi"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Claude/Claude.list,"💬 OpenAi"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Gemini/Gemini.list,"💬 OpenAi"

# 强制 AI 走代理（避免 DNS 污染）
DOMAIN-SUFFIX,openai.com,"💬 OpenAi"
DOMAIN-SUFFIX,anthropic.com,"💬 OpenAi"
DOMAIN-SUFFIX,googleapis.com,"💬 OpenAi"

# ===== 常规国外 =====
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Google/Google.list,"🌐 Global"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/GitHub/GitHub.list,"🌐 Global"

# ===== 媒体 =====
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/YouTube/YouTube.list,"📹 油管视频"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Netflix/Netflix.list,"🎥 奈飞视频"

# ===== 国内 =====
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list,"🎯 全球直连"
GEOIP,CN,"🎯 全球直连"

# ===== 广告 =====
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list,"🛑 广告拦截"

# ===== 最终 =====
FINAL,"🐟 漏网之鱼"

# ================== MITM ==================
[MITM]
skip-server-cert-verify = true